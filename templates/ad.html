{% extends "base/ad.html" %}

{% block scripts %}
<script>
    function openwindow(event) {
        const consentURL = "{{ url_for('consent', _external=True) }}?{{ query_string | safe }}";

        popup = window.open(
            consentURL,
            'Popup',
            'toolbar=no,location=no,status=no,menubar=no,scrollbars=yes,resizable=no,width=1100,height=840'
        );
        event.target.setAttribute("disabled", "");
    }

    document.getElementById("begin-button").onclick = openwindow;
</script>
{% endblock %}
