{% extends "layout.html" %}

{% block body %}
<div class="container" style="max-width: 900px; margin-top: 30px;">
  
  <div class="container" style="max-width: 900px; margin-top: 30px; display: flex; justify-content: space-between; align-items: baseline;">
    <h1 id="Main-header"></h1>
    <h4 id="timestep" style="color: gray;"></h4>
  </div>
  
  <hr>

  <div id="Task-A">
    <h4 id="sequence-A"></h4>
  
    <div>
      <p><strong>Previous player's answers</strong></p>
      <div id="parent-grid-A"></div>
    </div>
        
    <div style="margin-top: 20px;">
      <p><strong>Your answers</strong></p>
  
      <div style="display: flex; gap: 20px; align-items: flex-start;">
        
        <div id="grid-A"></div>
  
        <div>
          <p id="feedback-A"></p>
        </div>
  
      </div>
    </div>
  
    <br>
  </div>

  <hr>

  <div id="Task-B">
    <br>
    <h4 id="sequence-B"></h4>
  
    <div>
      <p><strong>Previous player's answers</strong></p>
      <div id="parent-grid-B"></div>
    </div>
        
    <div style="margin-top: 20px;">
      <p><strong>Your answers</strong></p>
  

      <div style="display: flex; gap: 20px; align-items: flex-start;">
        
        <div id="grid-B"></div>

        <div>
          <p id="feedback-B"></p>
        </div>
  
      </div>
    </div>
  </div>

  
  <div id="button-row" style="margin-top: 24px;">
    <button id="submit" class="btn btn-primary" disabled>Submit</button>
    <button id="continue" class="btn btn-secondary" style="display:none; margin-left:10px;">
    Continue
  </button>
  </div>
</div>
{% endblock %}

{% block libs %}
  {{ super() }}
  <script src="{{ url_for('static', filename='scripts/experiment.js') }}" type="text/javascript"></script>
{% endblock %}

{% block scripts %}
<script type="text/javascript">
  create_agent();
</script>
{% endblock %}
